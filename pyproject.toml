[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"
fix = false
exclude = ["build", "dist", ".venv", "templates"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E203"]

[tool.ruff.lint.per-file-ignores]
# LLM prompt strings and Thai dialogue embed unavoidably long lines
"core/namo_omega_engine.py" = ["E501"]
"core/namo_ultimate_engine.py" = ["E501"]
"core/fusion_brain.py" = ["E501"]
"core/metaphysical_engines.py" = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q"
pythonpath = ["."]
